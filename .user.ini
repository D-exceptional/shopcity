; -------------------------------------------------------------
; Hide all errors from the browser but log ALL errors to a file
; Works on WAMP (mod_fcgid) and cPanel (PHP-FPM)
; -------------------------------------------------------------
display_errors = Off
display_startup_errors = Off

log_errors = On
error_reporting = E_ALL

; ⚠ IMPORTANT: Set the correct path for your server!
error_log = "C:\wamp64\www\projects\showcase\shopcity\storage\logs\php-error.log"

; ----------------------------
; Session lifetime (2 hours)
; ----------------------------
session.gc_maxlifetime = 7200
session.cookie_lifetime = 7200
